# =============================================================================
# GraphForge - Nginx Configuration
# GraphForge Nginx 反向代理与静态资源服务配置
#
# Function:
#   1. Serve the Vue 3 SPA built files (index.html + assets)
#   2. Proxy /api/* requests to the backend FastAPI service
#
# Deployment:
#   This config is used inside the Docker container for the frontend service.
#   The SPA fallback (try_files) ensures client-side routing works.
# =============================================================================

server {
    listen 80;
    server_name localhost;

    # ---------------------------------------------------------------
    # Static files root - Vue 3 build output directory
    # ---------------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------
    # SPA fallback: for any non-file route, serve index.html
    # This enables Vue Router's history mode (no hash in URLs)
    # ---------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------------
    # API proxy: forward /api/* requests to the backend FastAPI service
    # The backend runs in a separate container named "api" on port 8000
    # ---------------------------------------------------------------
    location /api {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

