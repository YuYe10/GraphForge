[pytest]
# Pytest 配置文件

# 测试文件匹配规则
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = tests

# 出力配置
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=html
    --cov-report=term-missing

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 运行时间较长的测试
    graphrag: GraphRAG 相关测试
    api: API 端点测试
    service: 服务层测试
    db: 需要数据库的测试
    ai: 需要 AI 服务的测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*
    htmlcov/*
    main.py
    graphrag/api/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
