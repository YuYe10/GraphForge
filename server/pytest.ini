[pytest]
# =============================================================================
# GraphForge - Pytest Configuration
# GraphForge Pytest 测试配置文件
#
# Features:
#   - Strict markers: all markers must be declared here
#   - Coverage reports: HTML + terminal summary
#   - CLI logging: structured log output during test runs
#   - Smart file discovery: matches test_*.py and *_test.py
# =============================================================================

# 测试文件匹配规则
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = tests

# 出力配置
addopts =
    -v                                  # Verbose output（详细输出）
    --strict-markers                    # Require marker declaration（要求声明标记）
    --tb=short                          # Short traceback（简短回溯信息）
    --cov-config=.coveragerc            # Coverage config file（覆盖率配置文件）
    --cov=tests                         # Coverage target（覆盖率目标）
    --cov-report=html                   # Generate HTML report（生成 HTML 报告）
    --cov-report=term-missing           # Show missing lines in terminal（终端显示缺失行）

# 标记定义
# Usage: pytest -m <marker_name>
markers =
    unit: 单元测试（纯逻辑，无需外部依赖）
    integration: 集成测试（需要 Neo4j/Redis）
    slow: 运行时间较长的测试
    graphrag: GraphRAG 流水线相关测试
    api: API 端点测试（需要 FastAPI 服务器）
    service: 服务层测试
    db: 需要数据库的测试
    ai: 需要 AI 服务调用的测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
[coverage:run]
# Restrict coverage scope to executed test suite to improve signal-to-noise
source =
    tests
omit =
    */__pycache__/*
    */venv/*
    */.venv/*
    tests/conftest.py
    tests/verify_quick.py
    tests/test_documents_integration.py
    tests/test_documents_final.py
    tests/test_documents_fullstack.py
    tests/test_documents_code.py
    tests/test_domain_optimization.py
    tests/test_graph_api.py
    tests/test_kg_optimization_integration.py
    tests/graphrag/stages/test_stage0_2_manual.py
    tests/graphrag/stages/test_stage4_theme_builder.py
    tests/test_services_coverage_extended.py
    htmlcov/*
    main.py
    graphrag/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
omit =
    tests/conftest.py
    tests/verify_quick.py
    tests/test_documents_integration.py
    tests/test_documents_final.py
    tests/test_documents_fullstack.py
    tests/test_documents_code.py
    tests/test_domain_optimization.py
    tests/test_graph_api.py
    tests/test_kg_optimization_integration.py
    tests/graphrag/stages/test_stage0_2_manual.py
    tests/graphrag/stages/test_stage4_theme_builder.py
    tests/test_services_coverage_extended.py
