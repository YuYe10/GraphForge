version: "3.9"

services:
  neo4j:
    image: neo4j:5.15-community
    container_name: pow-neo4j
    environment:
      - NEO4J_AUTH=neo4j/neo4j1234
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
      # 添加以下环境变量
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512M
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
      # - ./server/infra/schema.cypher:/docker-entrypoint-initdb.d/init.cypher:ro
    healthcheck:
      # 简化健康检查，先确保容器能启动
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "test1234", "RETURN 1"]
      interval: 30s  # 增加间隔时间
      timeout: 10s   # 增加超时时间
      retries: 10    # 增加重试次数
      start_period: 60s  # 添加启动等待时间

  redis:
    image: redis:7-alpine
    container_name: pow-redis
    ports:
      - "6379:6379"     
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pow-api
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4j1234
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - AI_API_KEY=${AI_API_KEY:-}
      - ENABLE_NEO4J_GRAPHRAG=true
      - ENABLE_VECTOR_SEARCH=true
    ports:
      - "8000:8000"
    # 注意：Windows 的某些驱动器（例如 I:）在 Docker Desktop 中挂载可能会失败。
    # 如果出现挂载错误（mkdir /run/desktop/mnt/host/i: file exists），可临时使用 named volume 避开宿主机绑定：
    volumes:
      - server_data:/app
      - uploads_data:/app/uploads
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./app/vue
      dockerfile: Dockerfile
    container_name: pow-frontend
    environment:
      - VITE_API_BASE=http://api:8000
    ports:
      - "8788:80"
    depends_on:
      - api
    volumes:
      - frontend_data:/app
      - /app/node_modules

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  redis_data:
  uploads_data:
  server_data:
  frontend_data: